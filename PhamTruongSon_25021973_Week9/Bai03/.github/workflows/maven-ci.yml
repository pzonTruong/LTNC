name: Java CI with Maven

# Kích hoạt workflow khi có push hoặc pull_request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (Test and Package)
      # Lệnh này sẽ chạy qua các pha: validate, compile, test và package
      run: mvn clean package --file pom.xml

    - name: Upload JAR Artifact
      # Chỉ upload artifact nếu bước build maven thành công
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: mathutils-executable
        # Đường dẫn tới tệp .jar được sinh ra trong thư mục target
        path: target/*.jar
        retention-days: 7