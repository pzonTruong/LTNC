name: Automated Code Review

# Chỉ kích hoạt khi có Pull Request hướng vào nhánh main
on:
  pull_request:
    branches: [ main ]

jobs:
  checkstyle-review:
    name: runner / checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Checkstyle and Reviewdog
        uses: reviewdog/action-checkstyle@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # github-pr-review: Bot sẽ trực tiếp comment vào từng dòng code bị lỗi trên giao diện PR
          reporter: github-pr-review
          level: error
          checkstyle_config: config/checkstyle.xml
          fail_on_error: true # Đánh dấu Job này là Fail nếu có lỗi Checkstyle