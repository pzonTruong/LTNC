name: Java Multi-OS CI with Matrix

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-on-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast: false giúp các HĐH khác vẫn tiếp tục chạy nếu một cái bị lỗi
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test with Maven
      run: mvn test